<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Записи</title>
    <style>
        body {font-family:Arial; padding:30px;}
        table {border-collapse:collapse; width:500px}
        th,td {border:1px solid #ddd; padding: 8px 12px; text-align: left}
        th {background: #f0f0f0}
        input,select {padding: 6px 10px; margin-right: 8px; border: 1px solid #ccc; border-radius: 4px}
        button {padding: 6px 16px; background: #7c4daa; color: white; border: none; border-radius: 4px; cursor: pointer}
        .form-row {display:flex; gap:8px; flex-wrap; wrap; align-items: flex-end}
    </style>
</head>
<body>
    <p>
        <a href="/">
            На главную страницу
        </a>
    </p>
    <h1>
        Записи
    </h1>
    <table>
        <tr>
            <th>Дата</th>
            <th>Время</th>
            <th>Клиент</th>
            <th>Услуга</th>
        </tr>
        {%for a in appointments%}
        <tr>
            <td>{{a.date}}</td>
            <td>{{a.time}}</td>
            <td>{{a.client_name}}</td>
            <td>{{a.service_name}}</td>
        </tr>
        {%else%}
        <tr>
            <td>Записей пока нет</td>
        </tr>
        {% endfor %}
    </table>
    <form action="/appointments/add" method="post">
        <div class="form-row">
            <select name="client_id" required>
                <option value="">Клиент</option>
                 {%for client in clients%}
                <option value="{{client.id}}">{{client.name}}</option>
                {%endfor%}
            </select>
            <select name="service_id" required>
                <option value="">Услуга</option>
                 {%for service in services%}
                <option value="{{service.id}}">{{service.name}} ({{service.price}}р)</option>
                {%endfor%}
            </select>
            <input type="date" name="date" required>
            <input type="time" name="time" required>
            <button type="submit">Записать</button>
        </div>
    </form>
</body>
</html>
