<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Clients</title>
    <style>
        body {font-family:Arial; padding:30px;}
        table {border-collapse:collapse; width:500px}
        th,td {border:1px solid #ddd; padding: 8px 12px; text-align: left}
        th {background: #f0f0f0}
        input {padding: 6px 10px; margin-right: 8px; border: 1px solid #ccc; border-radius: 4px}
        button {padding: 6px 16px; background: #7c4daa; color: white; border: none; border-radius: 4px; cursor: pointer}


    </style>
</head>
<body>
<h1>Клиенты салона</h1>
<table>
    <tr>
        <th>Имя</th>
        <th>Телефон</th>
    </tr>
    {% for client in clients %}
    <tr>
        <td>
            {{client.name}}
        </td>
        <td>
            {{client.phone}}
        </td>
    </tr>
    {% endfor %}
</table>
<h2>Добавить клиента</h2>
<form action="/clients/add" method="post">
    <input type="text" name="name" placeholder="Имя" required>
    <input type="text" name="phone" placeholder="Телефон" required>
    <button type="submit">Добавить</button>
</form>
</body>
</html>
