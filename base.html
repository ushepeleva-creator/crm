<!DOCTYPE html>
<html lang="ru">
<head>
<style>
    body {font-family:Arial; padding:30px;}
    table {border-collapse: collapse; width: 500px; border-radius: 15px; overflow: hidden;box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
     font-family: Arial, sans-serif; text-align: center}
    th, td {border: 1px solid #d9d9d9; padding: 12px 15px}
    th {background: CornflowerBlue; color: white; font-weight: bold;}
    tr td:first-child {background-color: CornflowerBlue; color: white; font-weight: bold;text-align: left}
    input, select {padding: 6px 10px; margin-right: 8px; border: 1px solid #ccc; border-radius: 4px}
    button {padding: 6px 16px; background: CornflowerBlue; color: white; border: none; border-radius: 4px; cursor: pointer}
    nav {background: CornflowerBlue; padding: 14px 30px; display: flex; gap: 24px; align-items: center}
    nav a {color: white; text-decoration: none; font-size: 16px}
    .form-row {display:flex; gap:8px; flex-wrap: wrap; align-items: flex-end}
</style>

    <meta charset="UTF-8">
    <title>Салон красоты</title>
</head>

    </nav>

</body>
</html>
